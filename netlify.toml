# ================================================================
# Netlify 배포 설정
# ================================================================

# 빌드 설정: 별도 빌드 없이 현재 폴더를 그대로 배포
[build]
  publish = "."

# ----------------------------------------------------------------
# 서울 공공 API 프록시
# 이유: 브라우저에서 https:// 사이트가 http:// API를 직접 호출하면
#       "Mixed Content" 오류 발생
# 해결: Netlify 엣지 서버가 중간에서 http API를 대신 호출해줌
# ----------------------------------------------------------------
[[redirects]]
  from   = "/seoul-api/*"
  to     = "http://openAPI.seoul.go.kr:8088/:splat"
  status = 200
  force  = true
